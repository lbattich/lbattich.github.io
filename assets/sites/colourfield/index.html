<html>
  <head>
    <meta content="text/html; charset=utf-8" http-equiv="content-type">
    <meta name="author" content="Lucas Battich">
    <meta name="description" content="COLOURFIELD GENERATOR by LUCAS BATTICH">
    <title>Colourfield Generator - Lucas Battich</title>
  </head>
  <body style="text-align:center; background-color:black">
    <canvas id="landscape" onclick="start()"></canvas>
    <p id="d"></p>
    <script language="JavaScript">
      var x=document.getElementById("landscape");
      var y1,y2,y3,x1,m1,grd;
      var ctx=x.getContext("2d");
      window.onload = function(){start();
                                 setInterval(choose,900);}
      window.onkeydown = function(event) {
        var e = event.keyCode;
        if (e==80 /*p*/){save();}
      }

      function start() {
        x.width=window.innerWidth-30;
        x.height=window.innerHeight-30;
        ctx.fillStyle=colourme()+"1)";
        ctx.fillRect(0,0,x.width,x.height);
        ctx.fill();
        }

      function choose() {
        var numb=Math.floor(Math.random()*4);
        if (numb==0){line1()}
        else if (numb==1){line2()}
        else if (numb==2){line3()}
        else if (numb==3){line4()}

        ctx.closePath();
        grd.addColorStop(0,colourme()+"0)");
        grd.addColorStop(1,colourme()+"1)");
        ctx.fillStyle=grd;
        ctx.fill();
      }
              
      function line1() {
        y1=Math.floor((x.height+1)*Math.random());
        y2=Math.floor((x.height+1)*Math.random());
        y3=y2+((y1-y2)/2);
        m1=-1/((y2-y1)/x.width);
        x1=(x.width/2)+((x.height-y3)/m1);
        grd=ctx.createLinearGradient(x.width/2,y3,x1,x.height);
        ctx.beginPath();
        ctx.moveTo(0,y1);
        ctx.lineTo(x.width,y2);
        ctx.lineTo(x.width,x.height);
        ctx.lineTo(0,x.height);

      }

      function line2() {
        y1=Math.floor((x.height+1)*Math.random());
        y2=Math.floor((x.height+1)*Math.random());
        y3=y2+((y1-y2)/2);
        m1=-1/((y2-y1)/x.width);
        x1=(x.width/2)+((0-y3)/m1);
        grd=ctx.createLinearGradient(x.width/2,y3,x1,0);
        ctx.beginPath();
        ctx.moveTo(0,y1);
        ctx.lineTo(x.width,y2);
        ctx.lineTo(x.width,0);
        ctx.lineTo(0,0);
      }

      function line3() {
        y1=Math.floor((x.width+1)*Math.random());
        y2=Math.floor((x.width+1)*Math.random());
        y3=y2+((y1-y2)/2);
        m1=-1/((y2-y1)/x.height);
        x1=(x.height/2)+((0-y3)/m1);
        grd=ctx.createLinearGradient(y3,x.height/2,0,x1);
        ctx.beginPath();
        ctx.moveTo(y1,0);
        ctx.lineTo(y2,x.height);
        ctx.lineTo(0,x.height);
        ctx.lineTo(0,0);
      }

      function line4() {
        y1=Math.floor((x.width+1)*Math.random());
        y2=Math.floor((x.width+1)*Math.random());
        y3=y2+((y1-y2)/2);
        m1=-1/((y2-y1)/x.height);
        x1=(x.height/2)+((x.width-y3)/m1);
        grd=ctx.createLinearGradient(y3,x.height/2,x.width,x1);
        ctx.beginPath();
        ctx.moveTo(y1,0);
        ctx.lineTo(y2,x.height);
        ctx.lineTo(x.width,x.height);
        ctx.lineTo(x.width,0);
      }

      function colourme() {
        var a = Math.floor(256*Math.random());
        var b = Math.floor(256*Math.random());
        var c = Math.floor(256*Math.random());
        var colour = "rgba("+a+","+b+","+c+",";
        return colour;
      }

      function save() { 
        var d = x.toDataURL("image/jpeg");
        var w = window.open();
        var link = w.document.createElement('a');
        link.href = d
        link.download="print.jpg";
        if (document.createEvent) {
            var e = document.createEvent('MouseEvents');
            e.initEvent('click' ,true ,true);
            link.dispatchEvent(e);
            return true;
            }
        }
    </script>
