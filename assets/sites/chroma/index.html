<html>
  <head>
    <meta content="text/html; charset=utf-8" http-equiv="content-type">
    <meta name="author" content="Lucas Battich">
    <meta name="description" content="Chroma 16,777,216, by Lucas Battich, 2014-2017">
    <title>Chroma 16,777,216</title>
  </head>
  <body>
    <script language="JavaScript">
var a=0;
var b=0;
var c=0;
var dira=0;//dir variables: 0=up 1=down
var dirb=0;

//1ms:4.66hrs, 2ms:9.32hrs, 3ms:13.98hrs, 5ms:23.3hrs
window.onload = setInterval(function(){timera()},5);

function timera() {
    if (dira == 0) {
        a += 1;
        if (a == 255) {
            dira = 1;
            timerb();
        }
    } else {
        a -= 1;
        if (a == 0) {
            dira = 0;
            timerb();
        }
    }
    var hexa = a.toString(16);
    var hexb = b.toString(16);
    var hexc = c.toString(16);
    if (hexa.length < 2) {
        hexa = "0" + hexa;
    }
    if (hexb.length < 2) {
        hexb = "0" + hexb;
    }
    if (hexc.length < 2) {
        hexc = "0" + hexc;
    }
    document.body.style.backgroundColor = "#" + hexc + hexb + hexa; //apply colour
}

function timerb() {
    if (dirb == 0) {
        b += 1;
        if (b == 255) {
            dirb = 1;
            c += 1;
            if (c == 256) {
                a = 0;
                b = 0;
                c = 0;
            }
        }
    } else {
        b -= 1;
        if (b == 0) {
            dirb = 0;
            c += 1;
            if (c == 256) {
                a = 0;
                b = 0;
                c = 0;
            }
        }
    }
}
</script>
  </body>
</html>
