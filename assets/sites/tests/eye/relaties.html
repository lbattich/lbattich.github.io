				position: absolute;

				top:0px;
				left:0px;

				font-family: SourceSansPro, "Helvetica Neue", Arial, sans-serif;

			}
			td {
				height: 100%;
				width: 100%;
				padding: 10%;

				vertical-align: middle;
			}
			#key{
				font-family: SourceSansProExtra, "Helvetica Neue", Arial, sans-serif;
				font-size: 8vw;
				color: white;
				transition: color 0.18s;
				-webkit-transition: color 0.18s;
			}


		</style>

	<body>
		<table><td>
			<p id="key"></p>
		</table>
		
		<script language="javascript" type="text/javascript">

			var voicelist = responsiveVoice.getVoices();
			var index = 0;
					
			window.onload = change();

			// $(document).click(change());

			function start(){
				$("#key").css("color","white");
				$("#key").html("Click to start.");

				setTimeout(change,900);
			}


			function change(){
				$("#key").css("color","black");
				var randomV = Math.floor(Math.random()*voicelist.length);
				console.log(voicelist[randomV]);

				setTimeout(function() {
					$("#key").css("color","grey");
					$("#key").html(keywords[index])
					responsiveVoice.speak(keywords[index], voicelist[randomV].name);
					index += 1;
				}, 220);

				setTimeout(change,3000);
			}

			
		
		</script>
