 </div>
 
 
 <div id="page"></div>
  
<script language="javascript" type="text/javascript">

window.onload=generate();

function generate()
{
var x=document.getElementById("page")
var page = "";
for( var i=0; i < 40; i++ )
page += makeline() + '<br/>';
x.innerHTML = page;
}

function makeline()
{
var line = "";
//var string = "aaabb bcccddde.eefffgg.ghhh.iiil llmmm,nnn,ooopp,pqqqr rssstttvvvjjjzzzaabb..ccddeeff,gghhiillmmnnooppq rqsrsttv vj,jzzab.cdef,ghilmnop qrstvjzab.cdef,ghilmnop qrstvjz";
var string = "AAABBBCCCDDDEEEFFFGGGHHHIIIJJJLLLMMMNNNOOOPPPQQQRRRSSSTTTVVVZZZ   ...,,,";
for( var i=0; i < 80; i++ )
{
line += string.charAt(Math.floor(Math.random() * string.length));
}
return line;
}
</script>
