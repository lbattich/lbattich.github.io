			function generate() {
				var x=document.getElementById("output")
				var page = "";
				for( var i=0; i < 40; i++ )
				page += makeline() + "\n" + "\n";
				// document.getElementById("output").innerHTML = "You IP address is: " + myip;
				x.innerHTML = page;
				return page;
			}

			function makeline() {
				var line = "";
				//var string = "AAABBBCCCDDDEEEFFFGGGHHHIIIJJJKKKLLLMMMNNNOOOPPPQQQRRRSSSTTTVVVZZZ   ...,,,";
				var string = "ABCDEFGHIJKLMNOPQRSTVZ .,";
				for( var i=0; i < 80; i++ ) {
					line += string.charAt(Math.floor(Math.random() * string.length));
				}
				return line;
			}
			
			function savepdf() {
				var vol = Math.floor(Math.pow(10,16)*Math.random());
				var doc = new jsPDF();
				doc.setProperties({
					title: 'Library of Babel Volume #' + vol,
					subject: 'Library of Babel Volume',		
					author: 'Lucas Battich & user with IP ' + '00.00.00.00',
					keywords: 'generated, library, babel',
					creator: 'Unknown'
				});
				doc.setFont("times");
				doc.setFontSize(14);
				doc.text(50, 100, "Library of Babel Volume No. " + vol);
				doc.setTextColor(100);
				doc.text(80, 250, "Generated on " + day())
				doc.setTextColor(0);
				doc.setFontSize(9);
				for( var i=0; i < 410; i++ ) {
					doc.addPage();
					doc.text(25, 25, generate());
				}
				
				doc.save('Library of Babel Volume #' + vol + '.pdf')
			}

			function day() {
				var today = new Date();
				var dd = today.getDate();
				var mm = today.getMonth()+1; //January is 0!
				var yyyy = today.getFullYear();
				if(dd<10) {dd='0'+dd;} 
				if(mm<10) {mm='0'+mm;} 
				today = mm+'/'+dd+'/'+yyyy;
				return today;
			}
		</script>
