<html>
  <head>
  	<script src="jquery-1.11.1.min.js"></script>

    <title>PROUN GENERATOR - PROTOTYPE</title>
    <style>
    body
      {
        background-color:#000;
      }
    canvas
      {
        position: absolute;
        top: 0px;
        left: 0px;
        width:100%;
        height: 100%;
      }

  <body style="text-align:center">
  <canvas id="proun" onclick="insert()">
      Aw noes! Your browser does not support the HTML5 canvas tag - try using
      Chrome or Safari. Tech up! </canvas>


<script language="JavaScript">

      
var x=document.getElementById("proun"); //declare global var x for canvas
// var position;
// var positionx;
// var positiony;
var on=0;
var time = 10;
var r = 95;
var radioX = 51;
var ctx=x.getContext("2d");
var xc,yc;
var img = new Image();
var movX = 0;
var movY = 0;
img.src = "images/principe1.gif";
setInterval(function(){move()},1);
//x.width=window.innerWidth-30;
//x.height=window.innerHeight-30;


start();


window.onkeydown = function(event) {
        var e = event.keyCode;
        if (e==80 /*p*/){save();}
        else if (e==37 /*left*/){movX=1;}
        else if (e==39 /*right*/){movX=2;}
        else if (e==38 /*up*/){movY=1;}
        else if (e==40 /*down*/){movY=2;}
        else if (e==32 /*spacebar*/){movX=0;movY=0}
        else if (e==90 /*z*/){timeUP();}
        else if (e==88 /*x*/){timeDOWN();}
        else if (e==77 /*m*/){four();}
        else if (e==78 /*n*/){multi();}
        else if (e==66 /*b*/){line();}
        else if (e==86 /*v*/){curve();}
        else if (e==73 /*i*/){insert();}
        else if (e==83 /*s*/){on=1;choose();}
        else if (e==65 /*a*/){start();}
        else if (e==81 /*q*/){r=r-10;}
        else if (e==87 /*w*/){r=r+10}
    
      }
      
// $(x).mousemove(function(e){
// 		position = Math.round(100*(e.clientX/x.width));
// 		positionx = e.clientX;
// 		positiony = e.clientY;
// 		if (on==0){
// 		on=1;
// 		choose();
// 		}
// 		//console.log("move",e.clientX,e.clientY,position,on);
// 		})
		      
function start()
{
x.width=window.innerWidth-30;
x.height=window.innerHeight-30;
xc=x.width/2;
yc=x.height/2;
ctx.fillStyle="black"; //first colour
ctx.fillRect(0,0,x.width,x.height);
ctx.fill();
on=0;
}
function timeDOWN(){
	time+=3;
	}
	
function timeUP(){
	time=time-3;
	}

	
function move(){
	if (movX==1){xc = xc-4;} //left
    else if (movX==2){xc = xc+4;} //right
    
    if (movY==1){yc = yc-4;} //up
    else if (movY==2){yc = yc+4;} //down
    
    if (xc>x.width){movX=1;}
    else if (xc<0){movX=2;}
    
    if (yc>x.height){movY=1;}
    else if (yc<0){movY=2;}
    
	}

//choose btw different shapes
function choose() {
        //var numb=Math.floor(Math.random()*5);
        //if (numb==0){circle()}
        //else if (numb==1){circle()}
        //else if (numb==2){curve()}
        //else if (numb==3){circle()}
        //else if (numb==4){curve()};
        circle();
        if (on==1){
        setTimeout(function(){choose()},time);
        //console.log("move",e.clientX,e.clientY,position,on);
        }
        }

//functions:

//insert an image
function insert()
{
var imgW=Math.floor((x.height+1)*Math.random());
ctx.drawImage(img, (x.width/2)-(imgW/2), (x.height/2)-(imgW/2), imgW, imgW);
}
// circle:
function circle()
{
//var radio=Math.floor((x.width)*Math.random());
ctx.beginPath();
ctx.arc(xc,yc,radioX,0,2*Math.PI);
//var grd=ctx.createLinearGradient(xc-radio,yc-radio,xc+radio,yc+radio);
var grd=ctx.createRadialGradient(xc,yc,radioX-50,xc,yc,radioX+50);
grd.addColorStop(0,"rgba(0,0,0,1)");
grd.addColorStop(0.5,colourmeRED()+"1)");
grd.addColorStop(1,"rgba(0,0,0,1)");
ctx.strokeStyle=grd;
//ctx.lineWidth=Math.floor((100)*Math.random());
ctx.lineWidth=r;
ctx.stroke();
if (radioX<(r*9)){
	radioX=radioX+r;}
else {radioX=51;}
}

//create a 4 sided shape, filled with gradient
function four() 
{
var y1=Math.floor((x.height+1)*Math.random());
var x1=Math.floor((x.width+1)*Math.random());
ctx.beginPath();
ctx.moveTo(x1,y1);
for (i=0;i<4;i++){
var y1=Math.floor((x.height+1)*Math.random());
var x1=Math.floor((x.width+1)*Math.random());
ctx.lineTo(x1,y1);
}
ctx.closePath();
var grd=ctx.createLinearGradient(x.width/2,y1,x1,x.height);
grd.addColorStop(0,colourme()+"1)");
grd.addColorStop(1,colourme()+"1)");
ctx.fillStyle=grd;
ctx.fill();
}

//make a curve
function curve()
{
var radio=Math.floor((x.width)*Math.random());
var angle1=4*Math.random();
var angle2=4*Math.random(); 
console.log(yc,xc,angle1,angle2);
ctx.beginPath();
ctx.arc(xc,yc,radio,angle1,angle2);
var grd=ctx.createLinearGradient(xc-radio,yc+radio,xc+radio,yc-radio);
grd.addColorStop(0,colourme()+"1)");
grd.addColorStop(1,colourme()+"1)");
ctx.strokeStyle=grd;
ctx.lineWidth=Math.floor((150)*Math.random());
ctx.stroke();
}

//line
function line() 
{
var y1=Math.floor((x.height+1)*Math.random());
var x1=Math.floor((x.width+1)*Math.random());
var y2=Math.floor((x.height+1)*Math.random());
var x2=Math.floor((x.width+1)*Math.random());
ctx.beginPath();
ctx.moveTo(x1,y1);
ctx.lineTo(x2,y2);
ctx.closePath();
var grd=ctx.createLinearGradient(x1,y1,x2,y2);
grd.addColorStop(0,colourme()+"1)");
grd.addColorStop(1,colourme()+"1)");
ctx.strokeStyle=grd;
ctx.lineWidth=Math.floor((50)*Math.random());
ctx.stroke();
}

//create a multi sided shape, filled with gradient

function multi() 
{
var y1=Math.floor((x.height+1)*Math.random());
var x1=Math.floor((x.width+1)*Math.random());
ctx.beginPath();
ctx.moveTo(x1,y1);
for (i=0;i<10;i++){
y1=Math.floor((x.height+1)*Math.random());
x1=Math.floor((x.width+1)*Math.random());
ctx.lineTo(x1,y1);
}
ctx.closePath();
var grd=ctx.createLinearGradient(x.width/2,y1,x1,x.height);
grd.addColorStop(0,colourme()+"1)");
grd.addColorStop(1,colourme()+"1)");
ctx.fillStyle=grd;
ctx.fill();
}

//choose a random colour: RED GREEN YELLOW
function colourmeRED()
{
var a,b,c;
var numb=Math.floor(Math.random()*3);
if (numb==0){
	a = 200+Math.floor(56*Math.random());
	b = Math.floor(56*Math.random());
	c = Math.floor(56*Math.random());
}
else if (numb==1){
	b = 200+Math.floor(56*Math.random());
	a = Math.floor(56*Math.random());
	c = Math.floor(56*Math.random());
}
else if (numb==2){
	b = 220+Math.floor(36*Math.random());
	a = 220+Math.floor(36*Math.random());
	c = Math.floor(56*Math.random());
}
var colour = "rgba("+a+","+b+","+c+",";
return colour;
}

//choose a random colour
function colourme()
{
var a = Math.floor(256*Math.random());
var b = Math.floor(256*Math.random());
var c = Math.floor(256*Math.random());
var colour = "rgba("+a+","+b+","+c+",";
return colour;
}

//save as jpg when key 'p' is pressed
function save()
{ 
var d = x.toDataURL("image/jpeg");
var w = window.open();
var link = w.document.createElement('a');
link.href = d
link.download="proun.jpg";
if (document.createEvent) {
    var e = document.createEvent('MouseEvents');
    e.initEvent('click' ,true ,true);
    link.dispatchEvent(e);
    return true;
    }
}
</script>
  </body>
</html>
