	//start playing film and set event listeners for time change:
      function start()
      {
        x=-1;
        v.style.display="inline";
        v.muted=true;
        v.play();
        a.play();
        v.addEventListener("ended",function() {
          newcut();  
          this.play();
        },false);
        v.addEventListener("timeupdate", function() {
          var t=marker[x+1]-0.4;
          if(this.currentTime >= t){newcut();}
        },false);
      }
        

      function newcut()
      {
        x=Math.floor(Math.random()*(marker.length-1));
        v.currentTime = marker[x]+0.08;
      }
        function clicked(obj)
      {
        if(obj.paused){
          obj.play();
          a.play();
        }
        else{
          obj.pause();
          a.pause();
        }
      }
