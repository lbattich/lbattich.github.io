<html>
<head>
   <meta content="text/html; charset=utf-8" http-equiv="content-type">
   <meta name="author" content="Lucas Battich">
   <meta name="description" content="Analytic Philosophy Generator">

   <title>Analytic Philosophy Generator - Lucas Battich</title>

   <link href="style.css" rel="stylesheet">
   <script src="jquery-3.1.1.min.js"></script>
   <script type="text/javascript" src="list.js"></script>
   
</head>
<body>
  <div class="box">
    <h2>Analytic Philosophy Generator</h2>
    <div class="m">
      <p id="quote"></p>
    </div>

    <button class="btn m" type="submit">Generate new sentence</button>

    <div class="foot m">
      <p>- <a href="http://www.lucasbattich.com" target="_blank">Lucas Battich</a>
      <br>
      Based on concept and texts by <a href="http://www.andrewmbailey.com/Humor/Chart.pdf" target="_blank">Andrew M. Bailey</a>
    </div>
  </div>

  <script type="text/javascript">
      $("button").on("click", change);
      $("body").keypress(function (e) {
        if (e.which == 13) { change(); }
      });

      function change() {
        var b1 = Math.floor(Math.random()*block1.length);
        var b2 = Math.floor(Math.random()*block2.length);
        var b3 = Math.floor(Math.random()*block3.length);
        var b4 = Math.floor(Math.random()*block4.length);
        var sentence = block1[b1] + block2[b2] + block3[b3] + block4[b4];
        $("#quote").html(sentence);
      }

      window.onload = change();
  </script>
  
</body>
</html>
