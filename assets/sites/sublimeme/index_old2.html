  <head>
    <meta name="author" content="Lucas Battich">
    <meta name="description" content="SUBLIME ME by LUCAS BATTICH">
    <meta content="text/html; charset=utf-8" http-equiv="content-type">
    <script src="jquery-1.11.1.min.js"></script>
    <script src="//js.maxmind.com/js/apis/geoip2/v2.1/geoip2.js" type="text/javascript"></script>
    <title>Sublime Me</title>
    <style type="text/css">
      body {
        background-color: black;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 96vh;
        width: 99vw;
        }
      div{
        display: none;  
      }
    </style>
    
  </head>
  <body>
    <canvas id="myCanvas" width="578" height="400"></canvas>
    <div>
      <iframe width="560" height="315" src="https://www.youtube.com/embed/h0ZhcOmYwIk?autoplay=1&amp;controls=0&amp;showinfo=0" frameborder="0" allowfullscreen></iframe>
    </div>
    <script>
        var canvas = document.getElementById('myCanvas');
        var context = canvas.getContext('2d');
        var wanderer = new Image();
        wanderer.src = "wanderer-sq.png";

        function travel(travelLatitude, travelLongitude) {
          var imageObj = new Image();

          imageObj.onload = function() {
            canvas.width=window.innerHeight*0.9;
            canvas.height=window.innerHeight*0.9;
            context.drawImage(imageObj, 0, 0, canvas.width, canvas.height);
            context.drawImage(wanderer, canvas.width/5, canvas.height/3.9, canvas.width/1.2, canvas.height/1.2);
          };

          imageObj.src = "https://maps.googleapis.com/maps/api/streetview?size=640x640&location="+travelLatitude+","+travelLongitude+"&fov=100&pitch=20&key=AIzaSyD5UB0h_yIsdmRfZ11dxn-6fB175f3oUFU";

        }

        function geoCheck(userLatitude, userLongitude) {
          var coordinates = randomGeo(userLatitude, userLongitude, 1000); // radius 1000m

          fetch("https://maps.googleapis.com/maps/api/streetview/metadata?size=size=640x640&location="+coordinates.latitude+","+coordinates.longitude+"&fov=100&pitch=20&key=AIzaSyD5UB0h_yIsdmRfZ11dxn-6fB175f3oUFU")
            .then((resp) => resp.json()) // Transform the data into json
            .then(function(data) {

              if (data.status == "OK"){
                // no errors, we are travelling!
                travel(coordinates.latitude, coordinates.longitude);
                setTimeout(function(){ geoCheck(userLatitude, userLongitude) },2500);
              }
              else {
                // error, not traveling, will try again
                setTimeout(function(){ geoCheck(userLatitude, userLongitude) },1);
              }
              })
            .catch(function(error) {
              console.log(error);
            }); 
        }
      
        function randomGeo(centerLatitude, centerLongitude, radius) {
          var y0 = centerLatitude;
          var x0 = centerLongitude;
          var rd = radius / 111300; //about 111300 meters in one degree

          var u = Math.random();
          var v = Math.random();

          var w = rd * Math.sqrt(u);
          var t = 2 * Math.PI * v;
          var x = w * Math.cos(t);
          var y = w * Math.sin(t);

          //Adjust the x-coordinate for the shrinking of the east-west distances
          var xp = x / Math.cos(y0);

          var newlat = y + y0;
          var newlon = x + x0;
          var newlon2 = xp + x0;

          return {
              'latitude': newlat.toFixed(5),
              'longitude': newlon.toFixed(5),
              'longitude2': newlon2.toFixed(5),
          };
        }

        var getUserGeo = (function () {
          var updateCityText = function (geoipResponse) {
       
              /* It's possible that we won't have any names for this city */
              var cityName = geoipResponse.city.names.en || 'Your City';
       
              /*
                 most_specific_subdivision returns the smallest available
                 subdivision (region) as defined in ISO 3166-2.
              */
              var regionName = geoipResponse.most_specific_subdivision.names.en;
       
              var cityHTML = 'Sublime Me - '
                  + cityName;
       
              if (cityName && regionName ) {
                  cityHTML += ', ' + regionName;
              }

              document.title = cityHTML;

              geoCheck(geoipResponse.location.latitude, geoipResponse.location.longitude);

          };
       
          var onSuccess = function (geoipResponse) {
              updateCityText(geoipResponse);
          };
       
          /* If we get an error we will */
          var onError = function (error) {
              return;
          };
       
          return function () {
              geoip2.city( onSuccess, onError );
          };
        }());
        wanderer.onload = getUserGeo();
    </script>
  </body>
</html>
