<html lang="en" class="no-js">
<head>
    <meta charset="utf-8" />

    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

    {% if page.description %}
        <meta name="description" content="{{ page.description }}">
    {% endif %}

    {% if page.robots %}
        <meta name="robots" content="{{ page.robots }}">
    {% endif %}

    <meta name="author" content="Lucas Battich">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- <link rel="stylesheet" href="{{ '/assets/css/bootstrap.min.css' | relative_url }}" type="text/css" /> -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" type="text/css" />
    <script src="{{ '/assets/scripts/modernizr-2.6.1.min.js' | relative_url }}"></script>
    <script src="{{ '/assets/scripts/jquery.min.js' | relative_url }}"></script>
    <script src="{{ '/assets/scripts/tether.min.js' | relative_url }}"></script>
    <script src="{{ '/assets/scripts/bootstrap.min.js' | relative_url }}"></script>

    {% if page.math %}
        <script type="text/javascript" async
            src="https://cdn.jsdelivr.net/npm/mathjax@2.7.7/MathJax.js?config=AM_CHTML">
        </script>
    {% endif %}

    <script>
      function resizeIframe(obj) {
        var body = obj.contentWindow.document.body,
            html = obj.contentWindow.document.documentElement;

        obj.style.height = Math.max( body.scrollHeight, body.offsetHeight, 
                       html.clientHeight, html.scrollHeight, html.offsetHeight ) + 'px';
      }
    </script>

    {% include piwik.html %}

</head>
<body>
    <!-- header -->
    {% include header.html %}

    <!-- Content -->
    <section id="content">
        <div class="container">
            <div class="row">
                <div class="col-sx-12">
                    {{ content }}
                </div>
                <div class="col-sx-12">
                    {% if page.website %}
                        <iframe
                            class="web"
                            src="{{ page.website }}"
                            frameBorder="0"
                            {% if page.height %} height="{{ page.height }}" {% else %} onload="resizeIframe(this)" {% endif %}
                        ></iframe>
                    {% endif %}
                </div>
            </div>
        </div>
    </section>

    <!-- footer -->
    {% include footer.html %}

</body>
</html>
