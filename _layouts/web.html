<html lang="en" class="no-js">
<head>
    <meta charset="utf-8" />

    <title>{% if meta.title %}{{ meta.title }} | {% endif %}{{ site_title }}</title>
    {% if meta.description %}
        <meta name="description" content="{{ meta.description|striptags }}">
    {% endif %}
    {% if meta.robots %}
        <meta name="robots" content="{{ meta.robots }}">
    {% endif %}
    <meta name="author" content="Lucas Battich">
    <meta name="viewport" content="width=device-width, initial-scale=1">


     <link rel="stylesheet" href="{{ theme_url }}/css/bootstrap.min.css" type="text/css" />
    <link rel="stylesheet" href="{{ theme_url }}/css/style.css" type="text/css" />

    <script src="{{ theme_url }}/scripts/modernizr-2.6.1.min.js"></script>
    <script src="{{ theme_url }}/scripts/jquery.min.js"></script>
    <script src="{{ theme_url }}/scripts/tether.min.js"></script>
    <script src="{{ theme_url }}/scripts/bootstrap.min.js"></script>
    {% if meta.math %}
        <script type="text/javascript" async
            src="https://cdn.jsdelivr.net/npm/mathjax@2.7.7/MathJax.js?config=AM_CHTML">
        </script>
    {% endif %}

    <script>
      function resizeIframe(obj) {
        var body = obj.contentWindow.document.body,
            html = obj.contentWindow.document.documentElement;

        obj.style.height = Math.max( body.scrollHeight, body.offsetHeight, 
                       html.clientHeight, html.scrollHeight, html.offsetHeight ) + 'px';
      }
    </script>

    {% include "piwik.twig" %}

</head>
<body>
    <!-- header -->
    {% include "header.twig" %}

    <!-- Content -->
    <section id="content">
        <div class="container">
            <div class="row">
                <div class="col-sx-12">
                    {{ content }}
                </div>
                <div class="col-sx-12">
                    {% if current_page.meta.website %}
                        <iframe
                        class="web"
                        src="{{ meta.website }}"
                        frameBorder="0"
                        {% if current_page.meta.height %} height="{{ meta.height }};" {% else %} onload="resizeIframe(this)" {% endif %}
                        ></iframe>
                    {% endif %}
                </div>
            </div>
        </div>
    </section>

    <!-- footer -->
    {% include "footer.twig" %}

</body>
</html>
