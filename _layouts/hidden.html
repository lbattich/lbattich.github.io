<html lang="en" class="no-js">
<head>
    <meta charset="utf-8" />

    <title>{% if meta.title %}{{ meta.title }} | {% endif %}{{ site_title }}</title>
    {% if meta.description %}
        <meta name="description" content="{{ meta.description|striptags }}">
    {% endif %}

    <meta name="robots" content="noindex, nofollow">
    <meta name="author" content="Lucas Battich">

     <link rel="stylesheet" href="{{ theme_url }}/css/bootstrap.min.css" type="text/css" />
    <link rel="stylesheet" href="{{ theme_url }}/css/style.css" type="text/css" />

    <script src="{{ theme_url }}/scripts/modernizr-2.6.1.min.js"></script>
    <script src="{{ theme_url }}/scripts/jquery.min.js"></script>

    {% include piwik.html %}
</head>
<body>
    <!-- header -->
    {% include header.html %}

    <!-- Content -->
    <section id="content">
        <div class="container">
            <div class="row">
                <div class="col-md-2 hidden-sm-down">
                    <nav class="nav nav-pills nav-stacked bubble">
                        {% for page in pages if page.title %}
                            {% if page.id starts with "hidden/" %}
                               <a {% if page.id == current_page.id %} class="nav-link active" {% else %} class="nav-link" {% endif %} href="{{ page.url }}">{{ page.title }}</a>
                            {% endif %}
                        {% endfor %}
                    </nav>
                </div>

                <div class="col-md-10">                   
                    {{ content }}
                </div>
            </div>
        </div>
    </section>

    <!-- footer -->
    {% include footer.html %}

</body>
</html>
